services:
  - type: web
    name: rodzinna-lista-zakupow-api
    runtime: node
    rootDir: server
    plan: starter
    region: frankfurt
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/rodzinna_lista.sqlite
    disk:
      name: rodzinna-lista-data
      mountPath: /var/data
      sizeGB: 5
